name: AtCoder AC Notify

on:
  schedule:
    - cron: "2-57/5 * * * *"   # 10分ごとに実行
  workflow_dispatch:
    inputs:
      channel_id:
        description: '通知先のSlackチャンネルID'
        required: false
        default: ''
      user_id:
        description: '対象のAtCoderユーザーID'
        required: false
        default: ''


permissions:
  contents: write             # last_submission_ids.json を commit & push するため

jobs:
  check-ac:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Generate members.yml from secret
        env:
          MEMBERS_YAML: ${{ secrets.MEMBERS_YAML }}
        run: |
          mkdir -p data
          echo "$MEMBERS_YAML" > data/members.yml

      - name: Run AC check script
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/check_ac.py--channel_id "${{ github.event.inputs.channel_id }}" --user_id "${{ github.event.inputs.user_id }}"

      - name: Commit and push state file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_submission_ids.json data/streak.json
          git diff --cached --quiet || git commit -m "chore: update last submission ids"
          git push
