name: Count AtCoder Streak

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: '通知先のSlackチャンネルID'
        required: false
        default: ''
      user_id:
        description: '対象のAtCoderユーザーID'
        required: false
        default: ''


permissions:
  contents: write  # streak.json を commit & push するため

jobs:
  count-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run streak counter script
        env:
          MEMBERS_YAML: ${{ secrets.MEMBERS_YAML }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/count_streak.py --channel_id ${{ github.event.inputs.channel_id }} --user_id ${{ github.event.inputs.user_id }}

      - name: Commit and push updated streak data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/streak.json
          git diff --cached --quiet || git commit -m "chore: update streak data"
          git push

